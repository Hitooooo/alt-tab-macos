name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: scripts/codesign/setup_local.sh
      - run: scripts/run_tests.sh
      - run: scripts/build_app.sh
